<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Hashtag Generator 2026 — Free Tool</title>
<meta name="description" content="Generate the best Instagram hashtags instantly. Free Instagram hashtag generator for fitness, fashion, business, travel and more.">
<meta name="robots" content="index, follow">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#07080c;
color:#e8eaf0;
font-family:'Inter',sans-serif;
min-height:100vh;
padding:20px;
-webkit-font-smoothing:antialiased;
}

.container{
max-width:800px;
margin:auto;
}

nav{
margin-bottom:40px;
font-size:14px;
color:#8b93a7;
}

h1{
font-family:'Poppins',sans-serif;
font-size:clamp(2rem,5vw,3.2rem);
font-weight:800;
line-height:1.1;
margin-bottom:16px;
background:linear-gradient(90deg,#ffffff,#ff8ac7,#b4b9ff,#ffffff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 6s linear infinite;
}

@keyframes shine{
to{background-position:200% center;}
}

.subtitle{
color:#8b93a7;
margin-bottom:40px;
line-height:1.6;
}

.card{
background:#11131a;
border:1px solid #1e2130;
border-radius:20px;
padding:30px;
margin-bottom:30px;
}

.niches{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.niche-btn{
background:#151822;
border:1px solid #1e2130;
color:#8b93a7;
padding:8px 16px;
border-radius:50px;
cursor:pointer;
transition:.2s;
font-size:14px;
}

.niche-btn:hover{
border-color:#e1306c;
color:#fff;
}

.niche-btn.active{
background:#e1306c;
color:#fff;
border-color:#e1306c;
}

.generate-btn{
margin-top:20px;
background:linear-gradient(135deg,#ff8ac7,#e1306c);
border:none;
color:#fff;
padding:12px 30px;
border-radius:12px;
cursor:pointer;
font-weight:700;
font-family:'Poppins',sans-serif;
transition:.2s;
}

.generate-btn:hover{
transform:translateY(-2px);
opacity:.9;
}

.output{
margin-top:30px;
background:#0f1117;
padding:20px;
border-radius:12px;
border:1px solid #1e2130;
font-size:14px;
line-height:1.6;
word-wrap:break-word;
}

.copy-btn{
margin-top:15px;
background:#222;
border:none;
color:#fff;
padding:8px 16px;
border-radius:8px;
cursor:pointer;
}

footer{
margin-top:50px;
text-align:center;
color:#8b93a7;
font-size:14px;
}
</style>
</head>

<body>
<div class="container">

<nav>← All Tools / Instagram Hashtags</nav>

<h1>Instagram Hashtag Generator 2026</h1>
<p class="subtitle">
Pick your niche, generate up to 30 optimized hashtags, copy and paste into your Instagram post. Free forever.
</p>

<div class="card">

<div class="niches">
<button class="niche-btn" onclick="selectNiche(event,'fitness')">💪 Fitness</button>
<button class="niche-btn" onclick="selectNiche(event,'fashion')">👗 Fashion</button>
<button class="niche-btn" onclick="selectNiche(event,'business')">💼 Business</button>
<button class="niche-btn" onclick="selectNiche(event,'travel')">✈️ Travel</button>
<button class="niche-btn" onclick="selectNiche(event,'food')">🍔 Food</button>
</div>

<button class="generate-btn" onclick="generateHashtags()">🚀 Generate Hashtags</button>

<div id="output" class="output" style="display:none;"></div>
<button id="copyBtn" class="copy-btn" style="display:none;" onclick="copyHashtags()">📋 Copy Hashtags</button>

</div>

<footer>
© 2026 xailon.site — Free Instagram Tools
</footer>

</div>

<script>
let selectedNiche = "";

const hashtags = {
fitness: ["#fitness","#gym","#workout","#fitlife","#training","#health","#motivation","#fitnessmotivation","#bodybuilding","#gymlife","#cardio","#strong","#fit","#healthy","#exercise","#personaltrainer","#muscle","#abs","#fitnessmodel","#lifestyle","#fitnessaddict","#fitfam","#healthylifestyle","#weightloss","#nutrition","#gains","#instafit","#fitnessjourney","#fitnessgoals","#trainhard"],

fashion: ["#fashion","#style","#outfit","#ootd","#fashionista","#instastyle","#streetstyle","#trend","#model","#fashionblogger","#look","#beauty","#clothes","#shopping","#designer","#luxury","#vogue","#fashionstyle","#styleinspo","#trendy","#instafashion","#lookbook","#fashiongram","#chic","#runway","#stylish","#fashionaddict","#fashiontrend","#glam","#fashionweek"],

business: ["#business","#entrepreneur","#success","#startup","#marketing","#branding","#digitalmarketing","#hustle","#motivation","#leadership","#money","#investing","#ceo","#mindset","#goals","#onlinebusiness","#sales","#smallbusiness","#growth","#finance","#work","#innovation","#strategy","#network","#entrepreneurship","#businesstips","#productivity","#wealth","#mindsetmatters","#sidehustle"],

travel: ["#travel","#wanderlust","#travelgram","#vacation","#explore","#adventure","#trip","#nature","#holiday","#travelling","#tourism","#backpacking","#photography","#travelphotography","#instatravel","#travelblogger","#beach","#mountains","#passport","#world","#traveladdict","#explorer","#traveltheworld","#sunset","#culture","#journey","#discover","#travelgoals","#travelmore","#roam"],

food: ["#food","#foodie","#instafood","#delicious","#yummy","#foodphotography","#dinner","#lunch","#breakfast","#restaurant","#chef","#tasty","#foodlover","#homemade","#healthyfood","#cooking","#recipe","#dessert","#snack","#eat","#foodblogger","#foodstagram","#gourmet","#sweet","#fresh","#foodpics","#mealtime","#foodgram","#foodaddict","#nutrition"]
};

function selectNiche(event,niche){
selectedNiche = niche;
document.querySelectorAll(".niche-btn").forEach(btn=>btn.classList.remove("active"));
event.target.classList.add("active");
}

function generateHashtags(){
if(!selectedNiche){
alert("Please select a niche first.");
return;
}

let result = hashtags[selectedNiche].join(" ");
document.getElementById("output").style.display="block";
document.getElementById("copyBtn").style.display="inline-block";
document.getElementById("output").innerText = result;
}

function copyHashtags(){
let text = document.getElementById("output").innerText;
navigator.clipboard.writeText(text);
alert("Hashtags copied!");
}
</script>

</body>
</html>
